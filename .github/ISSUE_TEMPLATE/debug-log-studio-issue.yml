name: Debug Log Studio — Bug or Support Request
description: Report an issue or ask a setup question for the Debug Log Studio package
labels: ["debug-log-studio"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for raising an issue with **Debug Log Studio**.
        Please fill in as much detail as possible — it helps us resolve your issue faster.
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Bug — something is not working
        - Setup Help — post-installation question
        - Feature Request — suggest an improvement
    validations:
      required: true
  - type: dropdown
    id: package-version
    attributes:
      label: Package Version
      description: Find this in Setup → Installed Packages → Debug Log Studio
      options:
        - "1.0.0"
        - Other (specify in description)
    validations:
      required: true
  - type: dropdown
    id: setup-status
    attributes:
      label: Setup Status
      description: Have all 6 setup steps been completed in the Setup tab?
      options:
        - "Yes — all 6 steps complete (Validate & Save shows success)"
        - "Partial — stuck on a setup step (specify in description)"
        - "No — setup not started yet"
        - Not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "e.g. Clicking Validate Connection shows an error instead of a success message"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Debug Log Studio via App Launcher
        2. Navigate to the Explorer tab
        3. Click View on a log row
        4. Expected to see log content but modal is blank
  - type: dropdown
    id: affected-feature
    attributes:
      label: Affected Feature
      options:
        - Setup Wizard (Org Domain / External Client App / Auth Provider / Named Credential / Remote Site / Validate)
        - Explorer — log list not loading
        - Explorer — View log (Log Viewer modal)
        - Explorer — AI Summary
        - Explorer — Download log
        - Explorer — Delete / Mass Delete
        - Trace Flags — list / create / extend / delete
        - Debug Levels — list / create / edit / delete
        - Other
    validations:
      required: true
  - type: textarea
    id: org-details
    attributes:
      label: Org Details
      placeholder: |
        Salesforce Edition: (e.g. Enterprise, Developer, Unlimited)
        API Version:
        Agentforce enabled: Yes / No
        Named Credential status: Authenticated / Pending / Not created
        Remote Site Setting active: Yes / No / Not created
  - type: textarea
    id: error-message
    attributes:
      label: Error Message (if any)
      description: Paste the exact error message or screenshot description here
      render: shell
