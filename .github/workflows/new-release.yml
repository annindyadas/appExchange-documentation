name: New Release Detected

on:
  push:
    paths:
      - 'email-fd/release-notes.md'
      - 'debug-log-studio/release-notes.md'

jobs:
  detect-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect new version and update packages.json
        run: node .github/scripts/detect-release.js
        env:
          CHANGED_FILES: ${{ toJson(github.event.commits[0].modified) }}

      - name: Commit packages.json update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages.json
          git diff --staged --quiet || git commit -m "chore: update version in packages.json from release-notes [skip ci]"
          git push
